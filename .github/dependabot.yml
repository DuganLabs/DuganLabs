# Dependabot — managed centrally, copied identically into every repo.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["deps"]
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      basenative:
        patterns: ["@basenative/*"]
      dev-deps:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["deps", "infra"]
    commit-message:
      prefix: "ci"
