name: DuganLabs CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  deploy:
    name: Deploy to Cloudflare
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Resolve KV namespace IDs from Terraform
        working-directory: infra
        run: |
          terraform init -input=false
          BLOG_KV_ID=$(terraform output -raw blog_kv_id)
          REGISTRY_KV_ID=$(terraform output -raw registry_kv_id)
          sed -i "s/placeholder-create-via-wrangler/$BLOG_KV_ID/" ../worker/wrangler.toml
          sed -i "s/placeholder-registry/$REGISTRY_KV_ID/" ../worker/wrangler.toml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Deploy Worker + Pages
        run: pnpm exec nx run worker:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Worker \`duganlabs\` deployed to Cloudflare" >> $GITHUB_STEP_SUMMARY
