<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BaseNative Ecosystem — DuganLabs</title>
  <meta name="description" content="Browse the BaseNative package ecosystem — core runtime, components, forms, auth, database, and community packages.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23646cff'/><text x='50' y='68' font-family='system-ui,sans-serif' font-size='48' font-weight='700' fill='white' text-anchor='middle'>DL</text></svg>">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">

  <script>
    const t = localStorage.getItem('dl-theme') || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', t);
    if (t === 'light') document.documentElement.style.colorScheme = 'light';
  </script>

  <style>
    .eco-hero { text-align: center; padding-block: 3rem; }
    .eco-hero h2 { font-size: 2rem; margin-block-end: 0.75rem; }
    .eco-hero p { color: var(--text-secondary); max-inline-size: 40rem; margin-inline: auto; }

    .eco-controls {
      display: flex; flex-wrap: wrap; gap: 0.75rem;
      justify-content: center; margin-block-end: 2rem;
    }
    .eco-search {
      padding: 0.5rem 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text-primary);
      font: inherit; font-size: 0.875rem;
      min-inline-size: 16rem;
    }
    .eco-search:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

    .eco-categories {
      display: flex; flex-wrap: wrap; gap: 0.375rem;
      justify-content: center; margin-block-end: 2rem;
    }
    .eco-cat-btn {
      padding: 0.375rem 0.875rem;
      border-radius: 2rem;
      font-size: 0.8125rem;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 150ms ease;
    }
    .eco-cat-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .eco-cat-btn[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .eco-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr));
      gap: 1rem;
    }

    .eco-count {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-block-end: 1rem;
    }

    .eco-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    /* Package card styles (inline to avoid dependency) */
    [data-bn="pkg-card"] {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
      transition: border-color 150ms ease, transform 150ms ease;
    }
    [data-bn="pkg-card"]:hover { border-color: var(--accent); transform: translateY(-2px); }
    [data-bn="pkg-header"] { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; margin-block-end: 0.5rem; }
    [data-bn="pkg-name"] { font-size: 1rem; font-weight: 600; margin: 0; line-height: 1.3; }
    [data-bn="pkg-name"] a { color: var(--accent); text-decoration: none; }
    [data-bn="pkg-name"] a:hover { text-decoration: underline; }
    [data-bn="pkg-category"] { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); background: var(--surface-3); padding: 0.125rem 0.5rem; border-radius: 0.25rem; white-space: nowrap; }
    [data-bn="pkg-desc"] { font-size: 0.875rem; color: var(--text-secondary); margin-block-end: 0.75rem; line-height: 1.5; }
    [data-bn="pkg-tags"] { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-block-end: 0.75rem; }
    [data-bn="pkg-tag"] { font-size: 0.6875rem; padding: 0.125rem 0.5rem; border-radius: 0.25rem; background: var(--surface-3); color: var(--text-secondary); }
    [data-bn="pkg-stats"] { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body class="site-layout">

  <header role="banner">
    <a href="/" style="text-decoration:none;color:inherit"><h1>DuganLabs</h1></a>
    <nav aria-label="main">
      <a href="/">Projects</a>
      <a href="/blog">Blog</a>
      <a href="/ecosystem" aria-current="page">Ecosystem</a>
    </nav>
    <button id="btn-theme-toggle" type="button" aria-label="Toggle theme">Dark</button>
  </header>

  <main>
    <section class="eco-hero">
      <h2>BaseNative Ecosystem</h2>
      <p>Browse the full package registry — from core runtime primitives to UI components, authentication, database adapters, and community tooling.</p>
    </section>

    <section class="eco-controls">
      <input id="eco-search" class="eco-search" type="search" placeholder="Search packages..." aria-label="Search packages">
    </section>

    <section class="eco-categories" id="eco-categories" aria-label="Filter by category">
      <button class="eco-cat-btn" aria-pressed="true" data-category="">All</button>
    </section>

    <p class="eco-count" id="eco-count"></p>

    <section class="eco-grid" id="eco-grid" aria-label="Package listing">
      <p class="eco-empty">Loading packages...</p>
    </section>
  </main>

  <footer>
    <p>Built with <a href="https://github.com/DuganLabs/BaseNative">BaseNative</a></p>
  </footer>

  <script type="module" src="/js/ecosystem.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
