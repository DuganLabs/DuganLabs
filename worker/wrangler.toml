name = "duganlabs"
main = "index.js"
compatibility_date = "2026-04-04"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "duganlabs.com/*", zone_name = "duganlabs.com" },
  { pattern = "www.duganlabs.com/*", zone_name = "duganlabs.com" }
]

[[kv_namespaces]]
binding = "BLOG"
id = "placeholder-create-via-wrangler"
preview_id = "placeholder-preview"

[[kv_namespaces]]
binding = "REGISTRY"
id = "placeholder-registry"
preview_id = "placeholder-registry-preview"

[assets]
directory = "../pages"
binding = "ASSETS"
run_worker_first = true
